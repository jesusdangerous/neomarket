server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/catalog/ {
        proxy_pass http://catalog:8000/;
        proxy_set_header Host $host;
    }

    location /api/cart/ {
        proxy_pass http://cart:8000/;
        proxy_set_header Host $host;
    }

    location /api/orders/ {
        proxy_pass http://orders:8000/;
        proxy_set_header Host $host;
    }

    location /api/moderation/ {
        proxy_pass http://moderation:8000/;
        proxy_set_header Host $host;
    }
}
